<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MailBridge — Jail Correspondence Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#faf9f7;--surface:#fff;--surface2:#f4f2ee;
  --border:#e2ddd6;--border2:#cdc8bf;
  --text:#1a1814;--text2:#5c5750;--text3:#9c968e;
  --gold:#b8942a;--gold-bg:#fdf6e3;--gold-light:#e8d08a;
  --charcoal:#2c2a26;--charcoal2:#3d3a35;
  --green:#2d6a4f;--green-bg:#d8f3dc;
  --red:#9b2335;--red-bg:#fde8eb;
  --amber:#b5621a;--amber-bg:#fef3e2;
  --blue:#1a4d7c;--blue-bg:#e8f1fb;
  --r:8px;--rl:12px;
}
html,body{height:100%;font-family:'Jost',sans-serif;background:var(--bg);color:var(--text);font-size:14px}
.app{display:flex;height:100vh;overflow:hidden}

/* ── SIDEBAR ── */
.sidebar{width:235px;min-width:235px;background:var(--charcoal);color:#e8e4dc;display:flex;flex-direction:column;overflow:hidden}
.sb-logo{padding:20px 16px 14px;border-bottom:1px solid rgba(255,255,255,.08)}
.sb-logo h1{font-family:'Cormorant Garamond',serif;font-size:21px;font-weight:600;color:#d4a843;letter-spacing:.02em}
.sb-logo p{font-size:10px;color:rgba(255,255,255,.35);margin-top:2px;letter-spacing:.06em;text-transform:uppercase}
.sb-nav{padding:12px 8px;flex:1;overflow-y:auto}
.sb-label{font-size:9px;font-weight:600;color:rgba(255,255,255,.28);letter-spacing:.1em;text-transform:uppercase;padding:8px 8px 4px}
.nav-btn{display:flex;align-items:center;gap:9px;width:100%;padding:8px 10px;border:none;background:transparent;color:rgba(255,255,255,.58);font-size:13px;font-family:'Jost',sans-serif;font-weight:400;border-radius:var(--r);cursor:pointer;text-align:left;transition:all .15s}
.nav-btn:hover{background:rgba(255,255,255,.07);color:#fff}
.nav-btn.active{background:rgba(212,168,67,.15);color:#d4a843;font-weight:500}
.nav-btn i{font-size:16px;flex-shrink:0}
.nbadge{margin-left:auto;background:var(--red);color:#fff;font-size:10px;padding:1px 6px;border-radius:10px;font-weight:600}
.nbadge.warn{background:var(--amber)}
.nbadge.info{background:var(--blue)}
.sb-people{padding:8px;border-top:1px solid rgba(255,255,255,.08);overflow-y:auto;max-height:300px}
.p-item{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:var(--r);cursor:pointer;transition:background .15s}
.p-item:hover,.p-item.active{background:rgba(255,255,255,.07)}
.p-av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0}
.p-name{font-size:12px;font-weight:500;color:rgba(255,255,255,.85);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:128px}
.p-sub{font-size:10px;color:rgba(255,255,255,.32);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:128px}
.p-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-left:auto}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
.alert-banner{background:var(--red-bg);border-bottom:1px solid #f5b8c2;padding:8px 20px;font-size:12px;color:var(--red);display:none;align-items:center;gap:8px}
.topbar{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;background:var(--surface);flex-wrap:wrap}
.topbar h2{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;flex:1;color:var(--charcoal);min-width:120px}
.topbar-actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.content{flex:1;overflow-y:auto;padding:20px}

/* ── BUTTONS ── */
.btn{padding:7px 14px;border:1px solid var(--border2);border-radius:var(--r);background:var(--surface);color:var(--text2);font-size:12px;font-family:'Jost',sans-serif;font-weight:500;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:all .15s;white-space:nowrap}
.btn:hover{background:var(--surface2)}
.btn.primary{background:var(--charcoal);color:#d4a843;border-color:var(--charcoal)}
.btn.primary:hover{background:var(--charcoal2)}
.btn.gold{background:var(--gold-bg);color:var(--gold);border-color:var(--gold-light)}
.btn.gold:hover{background:#faeec8}
.btn.green{background:var(--green-bg);color:var(--green);border-color:#a8d5b5}
.btn.green:hover{background:#c4e8cb}
.btn.danger{color:var(--red);border-color:#f5b8c2;background:none}
.btn.danger:hover{background:var(--red-bg)}
.btn.sm{padding:5px 10px;font-size:11px}

/* ── STAT CARDS ── */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:14px 16px}
.stat-card .slabel{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.stat-card .svalue{font-size:28px;font-family:'Cormorant Garamond',serif;font-weight:600;line-height:1}
.stat-card .ssub{font-size:11px;color:var(--text3);margin-top:3px}

/* ── SECTION HEADER ── */
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;margin-top:20px}
.sh h3{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em}
.sh:first-child{margin-top:0}

/* ── PROFILE ── */
.profile-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:16px;margin-bottom:12px}
.ph{display:flex;align-items:flex-start;gap:14px;margin-bottom:14px}
.p-av-lg{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:600;flex-shrink:0}
.p-av-xl{width:80px;height:80px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:600;flex-shrink:0;overflow:hidden}
.p-av-xl img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.pm .full-name{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600}
.pm .tagline{font-size:12px;color:var(--text2);margin-top:2px}
.pm .badges{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.pill{font-size:11px;padding:3px 9px;border-radius:10px;font-weight:500}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ir .lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px}
.ir .val{font-size:13px;color:var(--text)}
.gold-div{height:2px;background:linear-gradient(90deg,var(--gold),transparent);border-radius:1px;margin:14px 0;opacity:.4}

/* ── HEALTH BAR ── */
.hbar-wrap{margin:8px 0 4px}
.hbar-label{display:flex;justify-content:space-between;font-size:11px;color:var(--text3);margin-bottom:3px}
.hbar{height:5px;border-radius:3px;background:var(--border);overflow:hidden}
.hbar-fill{height:100%;border-radius:3px;transition:width .4s}

/* ── MAIL LOG ── */
.mail-log{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;margin-bottom:12px}
.me{display:flex;align-items:center;gap:12px;padding:10px 16px;border-bottom:1px solid var(--border)}
.me:last-child{border-bottom:none}
.me-icon{width:32px;height:32px;border-radius:var(--r);background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:15px;color:var(--text2);flex-shrink:0}
.me-info{flex:1;min-width:0}
.me-info .mtype{font-size:13px;font-weight:500}
.me-info .mnote{font-size:11px;color:var(--text2);margin-top:1px}
.me-right{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0}
.me-date{font-size:11px;color:var(--text3)}
.me-status{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600}
.me-del{background:none;border:none;cursor:pointer;color:var(--text3);font-size:14px;padding:2px 4px;line-height:1;transition:color .15s}
.me-del:hover{color:var(--red)}

/* ── REMINDER CARDS ── */
.rc{display:flex;align-items:center;gap:12px;padding:12px 14px;border:1px solid var(--border);border-radius:var(--rl);margin-bottom:8px;background:var(--surface);cursor:pointer;transition:border-color .15s}
.rc:hover{border-color:var(--border2)}
.rc.urgent{border-color:#f5b8c2;background:var(--red-bg)}
.rc.soon{border-color:#f0d08a;background:var(--amber-bg)}
.rc .ri{font-size:18px;flex-shrink:0}
.rc .rinfo{flex:1}
.rc .rtitle{font-size:13px;font-weight:500}
.rc .rsub{font-size:11px;color:var(--text2);margin-top:2px}
.rc .rdays{font-size:12px;font-weight:600}

/* ── CONTACT GRID ── */
.cg{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.cc{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:14px;cursor:pointer;transition:border-color .15s}
.cc:hover{border-color:var(--gold)}
.cc .ccname{font-size:13px;font-weight:500;margin-top:6px}
.cc .ccfac{font-size:11px;color:var(--text2)}
.cc .ccstats{display:flex;justify-content:space-between;font-size:11px;color:var(--text3);margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}

/* ── TABS ── */
.tab-row{display:flex;gap:0;margin-bottom:16px;border-bottom:1px solid var(--border)}
.tab{padding:8px 16px;font-size:13px;font-family:'Jost',sans-serif;cursor:pointer;border:none;background:transparent;color:var(--text2);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;font-weight:400}
.tab.active{color:var(--charcoal);border-bottom-color:var(--gold);font-weight:500}

/* ── TIMELINE ── */
.timeline{position:relative;padding-left:22px}
.timeline::before{content:'';position:absolute;left:7px;top:0;bottom:0;width:1px;background:var(--border)}
.tl-item{position:relative;margin-bottom:16px}
.tl-item::before{content:'';position:absolute;left:-18px;top:5px;width:9px;height:9px;border-radius:50%;border:2px solid var(--border2);background:var(--surface)}
.tl-date{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.04em}
.tl-text{font-size:13px;margin-top:1px}

/* ── CHART ── */
.chart-wrap{display:flex;gap:6px;height:90px;align-items:flex-end}
.chart-col{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1}
.chart-bar{width:100%;border-radius:3px 3px 0 0;min-height:2px;transition:height .3s}
.chart-label{font-size:10px;color:var(--text3)}
.chart-count{font-size:10px;color:var(--text2);font-weight:500}

/* ── PHOTO UPLOAD ── */
.photo-drop{border:2px dashed var(--border2);border-radius:var(--rl);padding:20px;text-align:center;cursor:pointer;background:var(--surface2);transition:border-color .15s;position:relative}
.photo-drop:hover{border-color:var(--gold);background:var(--gold-bg)}
.photo-drop input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.photo-drop p{font-size:13px;color:var(--text3);pointer-events:none}
.photo-drop strong{display:block;font-size:13px;color:var(--text);margin-bottom:3px;pointer-events:none}
.jail-photo{width:100%;max-width:300px;border-radius:var(--r);border:1px solid var(--border);display:block;margin:0 auto}

/* ── SEARCH BAR ── */
.search-bar{display:flex;align-items:center;gap:8px;padding:8px 12px;border:1px solid var(--border2);border-radius:var(--r);background:var(--surface);margin-bottom:14px}
.search-bar input{border:none;background:transparent;color:var(--text);font-size:13px;flex:1;outline:none;font-family:'Jost',sans-serif}
.search-bar i{color:var(--text3);font-size:16px}

/* ── EMPTY STATE ── */
.empty{text-align:center;padding:40px 20px;color:var(--text3)}
.empty i{font-size:36px;display:block;margin-bottom:10px}
.empty p{font-size:13px}

/* ── MODAL ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px}
.modal{background:var(--surface);border-radius:var(--rl);padding:24px;width:520px;max-width:100%;max-height:90vh;overflow-y:auto;border:1px solid var(--border2);box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal h3{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;margin-bottom:18px;display:flex;align-items:center;gap:8px;color:var(--charcoal)}
.fr{margin-bottom:14px}
.fr label{display:block;font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
.fr input,.fr select,.fr textarea{width:100%;padding:8px 12px;border:1px solid var(--border2);border-radius:var(--r);background:var(--bg);color:var(--text);font-size:13px;font-family:'Jost',sans-serif;outline:none;transition:border-color .15s}
.fr input:focus,.fr select:focus,.fr textarea:focus{border-color:var(--gold)}
.fr textarea{resize:vertical;min-height:64px}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.ma{display:flex;justify-content:flex-end;gap:8px;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}

/* ── BACKUP SECTION ── */
.backup-box{background:var(--surface2);border:1px solid var(--border);border-radius:var(--rl);padding:18px 20px;margin-bottom:14px}
.backup-box h4{font-size:13px;font-weight:600;margin-bottom:4px;color:var(--charcoal)}
.backup-box p{font-size:12px;color:var(--text2);margin-bottom:12px;line-height:1.5}
.backup-box .ba{display:flex;gap:8px;flex-wrap:wrap}
.sync-note{font-size:12px;color:var(--text2);margin-top:10px;line-height:1.6;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:10px 14px}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;right:24px;background:var(--charcoal);color:#d4a843;padding:12px 20px;border-radius:var(--r);font-size:13px;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;font-family:'Jost',sans-serif;border:1px solid #3d3a35}
.toast.show{opacity:1}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
::-webkit-scrollbar-track{background:transparent}
</style>
</head>
<body>
<div class="app" id="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sb-logo">
      <h1>MailBridge</h1>
      <p>Jail correspondence tracker</p>
    </div>
    <div class="sb-nav">
      <div class="sb-label">Views</div>
      <button class="nav-btn active" id="nav-dashboard" onclick="setView('dashboard')"><i class="ti ti-layout-dashboard"></i>Dashboard</button>
      <button class="nav-btn" id="nav-contacts" onclick="setView('contacts')"><i class="ti ti-users"></i>Contacts<span class="nbadge warn" id="badge-contacts">0</span></button>
      <button class="nav-btn" id="nav-allmail" onclick="setView('allmail')"><i class="ti ti-mail"></i>All Mail</button>
      <button class="nav-btn" id="nav-reminders" onclick="setView('reminders')"><i class="ti ti-bell"></i>Reminders<span class="nbadge" id="badge-reminders" style="display:none">0</span></button>
      <button class="nav-btn" id="nav-backup" onclick="setView('backup')"><i class="ti ti-database"></i>Backup / Sync</button>
    </div>
    <div class="sb-people" id="sb-people">
      <div class="sb-label">People</div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="alert-banner" id="alert-banner"><i class="ti ti-alert-triangle"></i><span id="alert-text"></span></div>
    <div class="topbar">
      <h2 id="view-title">Dashboard</h2>
      <div class="topbar-actions" id="topbar-actions">
        <button class="btn green" onclick="exportToExcel()" title="Export backup to Excel"><i class="ti ti-download"></i>Export</button>
        <button class="btn" onclick="document.getElementById('imp-xlsx').click()" title="Import from Excel"><i class="ti ti-upload"></i>Import</button>
        <input type="file" id="imp-xlsx" accept=".xlsx" style="display:none" onchange="importFromExcel(this)">
        <button class="btn primary" onclick="openAddContact()"><i class="ti ti-user-plus"></i>Add Contact</button>
        <button class="btn gold" id="log-mail-btn" style="display:none" onclick="openLogMail(null)"><i class="ti ti-send"></i>Log Mail</button>
      </div>
    </div>
    <div class="content" id="main-content"></div>
  </div>
</div>

<div id="modal-root"></div>
<div class="toast" id="toast"></div>


<script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
<script>
// ── STATE & STORAGE ───────────────────────────────────
var KEY = 'mailbridge_v2';
var S = loadState();

function loadState() {
  try { var s = localStorage.getItem(KEY); if (s) return JSON.parse(s); } catch(e) {}
  return {
    contacts: [{
      id: 'c0', color: '#7F77DD', colorBg: '#EEEDFE',
      type: 'jail',                          // 'jail' | 'prison'
      firstName: 'Tyler', lastName: 'Nathan Brown',
      race: 'Black', sex: 'Male', age: '40',
      facility: 'Cleveland County Detention Center',
      facilityAddr: 'Shelby, NC 28150',
      inmateId: '24CR294360 / 26CR003765',   // docket# for jail; DOC/OPUS# for prison
      bookingDate: '2026-04-02',             // arrest date (jail) or sentencing date (prison)
      sentenceLength: '',                    // prison only  e.g. "21 months"
      releaseDate: '', courtDate: '',
      paroleBoardDate: '',                   // prison only
      charges: 'OFA – Probation Violation / Felony (Sentenced)\nFTA – Driving While License Revoked – Gaston Co (Pre-Trial)',
      bond: 'No Bond / $1,000 Secured',
      mailInterval: 14,
      relationship: 'Ministry contact',
      notes: 'Mail may be read by facility staff. Keep content appropriate.',
      photo: null, mailLog: []
    }],
    templates: [
      {id:'t1',name:'First letter',cat:'Check-in',body:"Dear {name},\n\nI've been thinking about you and wanted to reach out. I hope you are holding up as best you can. Know that you are not forgotten.\n\nPlease write back when you get the chance.\n\nWith care,\nJoshua"},
      {id:'t2',name:'Encouragement',cat:'Encouragement',body:"Dear {name},\n\nI'm writing to remind you that this season does not define you. You have people who believe in who you are and who you are becoming.\n\nKeep your head up. One day at a time.\n\nAlways in your corner,\nJoshua"},
      {id:'t3',name:'Birthday',cat:'Birthday',body:"Dear {name},\n\nHappy Birthday. I know this isn't the setting you would choose, but I want you to know I'm thinking of you today. Your life has value and purpose beyond these walls.\n\nHere's to better days ahead.\n\nWith love,\nJoshua"}
    ]
  };
}

function persist() { try { localStorage.setItem(KEY, JSON.stringify(S)); } catch(e) {} }
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,5); }
function todayStr() { return new Date().toISOString().slice(0,10); }

var COLORS = [
  {hex:'#7F77DD',bg:'#EEEDFE'},{hex:'#1D9E75',bg:'#E1F5EE'},{hex:'#D85A30',bg:'#FAECE7'},
  {hex:'#D4537E',bg:'#FBEAF0'},{hex:'#378ADD',bg:'#E6F1FB'},{hex:'#639922',bg:'#EAF3DE'},
  {hex:'#BA7517',bg:'#FAEEDA'}
];
var MAIL_TYPES = ['Letter','Card','Book','Magazine','Money Order','Photo','Legal Document','Received — Letter','Received — Card','Other'];
var RELATIONSHIPS = ['Friend','Family','Client','Ministry contact','Acquaintance','Other'];
var INTERVALS = [7,14,21,30,60];

// ── VIEW STATE ────────────────────────────────────────
var V = { view: 'dashboard', contact: null, search: '' };

// ── HELPERS ───────────────────────────────────────────
function isPrison(c) { return (c.type||'jail') === 'prison'; }
function initials(c) { return ((c.firstName||'?')[0]+(c.lastName||'?')[0]).toUpperCase(); }
function fmtDate(d) {
  if (!d) return '—';
  var p = d.split('-'), m = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return m[parseInt(p[1])-1]+' '+parseInt(p[2])+', '+p[0];
}
function daysAgo(d) { if (!d) return null; return Math.floor((new Date(todayStr())-new Date(d))/864e5); }
function daysUntil(d) { if (!d) return null; return Math.floor((new Date(d)-new Date(todayStr()))/864e5); }
function lastMail(c) { var l=(c.mailLog||[]).filter(m=>!m.type.startsWith('Received')); if(!l.length)return null; return l.slice().sort((a,b)=>b.date.localeCompare(a.date))[0].date; }
function daysSinceMail(c) { var d=lastMail(c); return d?daysAgo(d):null; }
function isOverdue(c) { var ds=daysSinceMail(c); return ds!==null && ds>c.mailInterval; }
function neverMailed(c) { return !(c.mailLog||[]).filter(m=>!m.type.startsWith('Received')).length; }
function healthScore(c) {
  var sent=(c.mailLog||[]).filter(m=>!m.type.startsWith('Received'));
  var recd=(c.mailLog||[]).filter(m=>m.type.startsWith('Received'));
  if(!sent.length) return 0;
  var ds=daysSinceMail(c)||999;
  return Math.min(Math.round(Math.min(sent.length*15,40)+Math.max(0,40-ds*2)+Math.min(recd.length*5,20)),100);
}
function hColor(s){ return s>=70?'#2d6a4f':s>=40?'#b5621a':'#9b2335'; }

// ── NAVIGATION ────────────────────────────────────────
function setView(view, cid) {

function renderSidebar() {

// ── MAIL ENTRY HTML ───────────────────────────────────
var TYPE_ICONS={'Letter':'ti-file-text','Card':'ti-heart','Book':'ti-book','Magazine':'ti-news','Money Order':'ti-cash','Photo':'ti-photo','Legal Document':'ti-scale','Received — Letter':'ti-mail-opened','Received — Card':'ti-heart-handshake','Other':'ti-package'};
var STATUS_STYLES={'Sent':['#d8f3dc','#2d6a4f'],'Delivered':['#d8f3dc','#1b4332'],'Returned':['#fde8eb','#9b2335'],'Unknown':['#f4f2ee','#5c5750'],'Received':['#e8f1fb','#1a4d7c']};

function meHtml(m, contact, showDelete) {
  var ic=TYPE_ICONS[m.type]||'ti-mail';
  var isRec=m.type.startsWith('Received');
  var ss=STATUS_STYLES[isRec?'Received':(m.status||'Sent')];
  return '<div class="me">'
    +'<div class="me-icon" style="background:'+(isRec?'#e8f1fb':'var(--surface2)')+';color:'+(isRec?'#1a4d7c':'var(--text2)')+'"><i class="ti '+ic+'"></i></div>'
    +'<div class="me-info"><div class="mtype">'+(contact?'<a href="#" onclick="setView(\'profile\',\''+contact.id+'\');return false" style="color:var(--text);text-decoration:none">'+contact.firstName+' '+contact.lastName+'</a> — ':'')+m.type+'</div>'
    +'<div class="mnote">'+(m.note||'No note')+(m.followup?'<span style="color:var(--amber);font-size:10px;margin-left:8px">↩ Follow-up '+fmtDate(m.followup)+'</span>':'')+'</div>'
    +'</div>'
    +'<div class="me-right"><div class="me-date">'+fmtDate(m.date)+'</div>'
    +'<div class="me-status" style="background:'+ss[0]+';color:'+ss[1]+'">'+(isRec?'Received':m.status||'Sent')+'</div>'
    +(showDelete?'<button class="me-del" onclick="deleteMail(\''+m.id+'\',\''+m._cid+'\')" title="Delete">✕</button>':'')
    +'</div></div>';
}

// ── DASHBOARD ─────────────────────────────────────────
function renderDashboard() {
  var total=S.contacts.length;
  var jailCount=S.contacts.filter(c=>!isPrison(c)).length;
  var prisonCount=S.contacts.filter(isPrison).length;
  var totalMail=S.contacts.reduce((s,c)=>(s+(c.mailLog||[]).filter(m=>!m.type.startsWith('Received')).length),0);
  var od=S.contacts.filter(isOverdue).length, nm=S.contacts.filter(neverMailed).length;
  var allMail=[];
  S.contacts.forEach(c=>(c.mailLog||[]).forEach(m=>allMail.push(Object.assign({},m,{_cid:c.id,contact:c}))));
  allMail.sort((a,b)=>b.date.localeCompare(a.date));
  var contactCards=S.contacts.slice(0,6).map(c=>{
    var sl='Active',sc='#2d6a4f';
    if(neverMailed(c)){sl='Never mailed';sc='#9c968e';}
    else if(isOverdue(c)){sl='Overdue';sc='#9b2335';}
    return '<div class="cc" onclick="setView(\'profile\',\''+c.id+'\')">'
      +'<div style="display:flex;align-items:center;gap:8px"><div class="p-av" style="background:'+c.colorBg+';color:'+c.color+';width:36px;height:36px;font-size:13px">'+initials(c)+'</div>'+typeBadge(c)+'</div>'
      +'<div class="ccname">'+c.firstName+' '+c.lastName+'</div>'
      +'<div class="ccfac">'+c.facility+'</div>'
      +'<div class="ccstats"><span>'+(c.mailLog||[]).filter(m=>!m.type.startsWith('Received')).length+' sent</span><span style="color:'+sc+';font-weight:500">'+sl+'</span></div>'
      +'</div>';
  }).join('');
  var cd=buildChart(); var ck=Object.keys(cd), cv=ck.map(k=>cd[k]), cm=Math.max(...cv,1);
  var months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var chartHtml=ck.map((k,i)=>{var pct=Math.round((cv[i]/cm)*100);return '<div class="chart-col"><div class="chart-count">'+(cv[i]||'')+'</div><div style="flex:1;width:100%;display:flex;align-items:flex-end"><div class="chart-bar" style="height:'+(pct||2)+'%;background:#b8942a;opacity:'+(cv[i]?.8:.15)+'"></div></div><div class="chart-label">'+months[parseInt(k.split('-')[1])-1]+'</div></div>';}).join('');
  return '<div class="stats-row">'
    +'<div class="stat-card"><div class="slabel">Total</div><div class="svalue">'+total+'</div><div class="ssub">'+jailCount+' jail · '+prisonCount+' prison</div></div>'
    +'<div class="stat-card"><div class="slabel">Mail Sent</div><div class="svalue">'+totalMail+'</div><div class="ssub">total pieces</div></div>'
    +'<div class="stat-card"><div class="slabel">Overdue</div><div class="svalue" style="color:'+(od?'#9b2335':'inherit')+'">'+od+'</div><div class="ssub">past interval</div></div>'
    +'<div class="stat-card"><div class="slabel">Never Mailed</div><div class="svalue" style="color:'+(nm?'#b5621a':'inherit')+'">'+nm+'</div><div class="ssub">need first letter</div></div>'
    +'</div>'
    +(total?'<div class="sh"><h3>Contacts</h3><button class="btn sm" onclick="setView(\'contacts\')">View all</button></div><div class="cg">'+contactCards+'</div>':'')
    +'<div class="sh"><h3>Recent Mail</h3><button class="btn sm" onclick="setView(\'allmail\')">View all</button></div>'
    +'<div class="mail-log">'+(allMail.length?allMail.slice(0,5).map(m=>meHtml(m,m.contact,false)).join(''):'<div class="empty" style="padding:20px"><i class="ti ti-mail-off"></i><p>No mail logged yet.</p></div>')+'</div>'
    +'<div class="sh" style="margin-top:24px"><h3>Mail activity — last 6 months</h3></div>'
    +'<div class="profile-card"><div class="chart-wrap">'+chartHtml+'</div></div>';
}

function buildChart() {
  var months={}, now=new Date(todayStr());
  for(var j=5;j>=0;j--){var d=new Date(now.getFullYear(),now.getMonth()-j,1);var k=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');months[k]=0;}
  S.contacts.forEach(c=>(c.mailLog||[]).filter(x=>!x.type.startsWith('Received')).forEach(x=>{var key=x.date.substring(0,7);if(key in months)months[key]++;}));
  return months;
}

// ── ALL MAIL ──────────────────────────────────────────
function renderAllMail() {
  var all=[];
  S.contacts.forEach(c=>(c.mailLog||[]).forEach(m=>all.push(Object.assign({},m,{_cid:c.id,contact:c}))));
  all.sort((a,b)=>b.date.localeCompare(a.date));

  all.forEach(m=>{var k=m.date.substring(0,7);if(!grouped[k])grouped[k]=[];grouped[k].push(m);});
  var html='';
  Object.keys(grouped).sort().reverse().forEach(mo=>{

    html+='<div class="sh"><h3>'+mn+' '+p[0]+'</h3></div><div class="mail-log">'+grouped[mo].map(m=>meHtml(m,m.contact,true)).join('')+'</div>';

  return html;
}

// ── REMINDERS ─────────────────────────────────────────
function renderReminders() {
  var od=S.contacts.filter(isOverdue), nm=S.contacts.filter(neverMailed), upcoming=[];

    if(!isPrison(c)&&c.courtDate){var du=daysUntil(c.courtDate);if(du!==null&&du>=0&&du<=30)upcoming.push({c,days:du,label:'Court date',date:c.courtDate,icon:'ti-scale',col:'#1a4d7c'});}
    // Both: release date
    if(c.releaseDate){var dr=daysUntil(c.releaseDate);if(dr!==null&&dr>=0&&dr<=90)upcoming.push({c,days:dr,label:'Release / PRD',date:c.releaseDate,icon:'ti-door-exit',col:'#2d6a4f'});}
    // Prison: parole board date
    if(isPrison(c)&&c.paroleBoardDate){var dp=daysUntil(c.paroleBoardDate);if(dp!==null&&dp>=0&&dp<=90)upcoming.push({c,days:dp,label:'Parole board date',date:c.paroleBoardDate,icon:'ti-gavel',col:'#b5621a'});}
  });
  var fu=[];
  S.contacts.forEach(c=>(c.mailLog||[]).filter(m=>m.followup).forEach(m=>{var d=daysUntil(m.followup);if(d!==null&&d>=0&&d<=7)fu.push({c,days:d,m});}));

  od.forEach(c=>{var ds=daysSinceMail(c);html+='<div class="rc urgent" onclick="setView(\'profile\',\''+c.id+'\')">'
    +'<i class="ti ti-alert-triangle ri" style="color:#9b2335"></i>'
    +'<div class="rinfo"><div class="rtitle">'+c.firstName+' '+c.lastName+' '+typeBadge(c)+'</div><div class="rsub">'+c.facility+' · last mail '+ds+'d ago (interval: every '+c.mailInterval+'d)</div></div>'

  html+='<div class="sh"><h3>Never mailed ('+nm.length+')</h3></div>';
  if(!nm.length) html+='<p style="font-size:13px;color:var(--text3);margin-bottom:12px">All contacts have at least one piece of mail.</p>';
  nm.forEach(c=>{var ds=c.bookingDate?daysAgo(c.bookingDate):null; html+='<div class="rc soon" onclick="setView(\'profile\',\''+c.id+'\')">'
    +'<i class="ti ti-clock ri" style="color:#b5621a"></i>'
    +'<div class="rinfo"><div class="rtitle">'+c.firstName+' '+c.lastName+' '+typeBadge(c)+'</div><div class="rsub">'+c.facility+(ds?' · '+(isPrison(c)?'sentenced':'booked')+' '+ds+'d ago':'')+' — no mail sent</div></div>'
    +'<button class="btn sm gold" onclick="event.stopPropagation();openLogMail(\''+c.id+'\')">Log first mail</button></div>';});

  if(fu.length){

    fu.sort((a,b)=>a.days-b.days).forEach(f=>{html+='<div class="rc" onclick="setView(\'profile\',\''+f.c.id+'\')">'

  return html;
}

  if(!prison) infoGrid+='<div class="ir"><div class="lbl">Next court date</div><div class="val">'+(c.courtDate?fmtDate(c.courtDate)+(daysUntil(c.courtDate)!==null?' (in '+daysUntil(c.courtDate)+'d)':''):'—')+'</div></div>';

  infoGrid+='<div class="ir" style="grid-column:span 2"><div class="lbl">Charges</div><div class="val" style="font-size:12px;white-space:pre-line">'+(c.charges||'—')+'</div></div>';
  infoGrid+='<div class="ir"><div class="lbl">Facility address</div><div class="val">'+(c.facilityAddr||'—')+'</div></div>';
  infoGrid+='</div>';

  // Stat boxes — jail shows "Days held", prison shows "Days remaining"
  var stat3label=prison?'Days left':'Days held';
  var stat3val=prison?daysRemaining:(daysIn!==null?daysIn:'—');

  return '<div class="profile-card">'
    +'<div class="ph">'
    +(c.photo?'<div class="p-av-xl"><img src="'+c.photo+'" alt="'+c.firstName+'"></div>':'<div class="p-av-xl" style="background:'+c.colorBg+';color:'+c.color+'">'+initials(c)+'</div>')
    +'<div class="pm" style="flex:1">'

function profileMailLog(c) {

function profileNotes(c) {
  var prison=isPrison(c);
  var rdu=c.releaseDate?daysUntil(c.releaseDate):null;
  var events=[];
  if(c.bookingDate) events.push({date:c.bookingDate,text:(prison?'Sentenced — began serving at ':'Arrested / booked at ')+c.facility,future:false});
  (c.mailLog||[]).forEach(m=>events.push({date:m.date,text:m.type+' '+(m.type.startsWith('Received')?'received':'sent')+(m.note?' — '+m.note:''),future:false}));
  if(!prison&&c.courtDate) events.push({date:c.courtDate,text:'Next court date',future:true});
  if(prison&&c.paroleBoardDate) events.push({date:c.paroleBoardDate,text:'Parole board date',future:true});
  if(c.releaseDate) events.push({date:c.releaseDate,text:'Release / PRD',future:true});
  events.sort((a,b)=>b.date.localeCompare(a.date));
  return '<div class="profile-card"><div class="ir" style="margin-bottom:14px"><div class="lbl">Notes / Mail restrictions</div><div class="val" style="margin-top:4px;white-space:pre-line">'+(c.notes||'No notes.')+'</div></div>'
    +'<div class="info-grid">'
    +'<div class="ir"><div class="lbl">Release / PRD</div><div class="val">'+(c.releaseDate?fmtDate(c.releaseDate)+(rdu!==null?' ('+( rdu>=0?'in '+rdu+'d':Math.abs(rdu)+'d ago')+')':''):'Not set')+'</div></div>'
    +(prison&&c.paroleBoardDate?'<div class="ir"><div class="lbl">Parole board date</div><div class="val">'+fmtDate(c.paroleBoardDate)+'</div></div>':'')
    +(!prison&&c.courtDate?'<div class="ir"><div class="lbl">Next court date</div><div class="val">'+fmtDate(c.courtDate)+'</div></div>':'')
    +(prison&&c.sentenceLength?'<div class="ir"><div class="lbl">Sentence length</div><div class="val">'+c.sentenceLength+'</div></div>':'')
    +'</div></div>'
    +'<div class="sh" style="margin-top:14px"><h3>Activity timeline</h3></div>'

function showTab(btn, tab, cid) {

// ── PHOTO ─────────────────────────────────────────────
function uploadPhoto(cid, input) {
  var file=input.files[0]; if(!file) return;
  if(file.size>4*1024*1024){alert('Photo too large (max 4MB).');input.value='';return;}
  var r=new FileReader();
  r.onload=function(e){var c=S.contacts.find(x=>x.id===cid);if(!c)return;c.photo=e.target.result;persist();document.getElementById('ptab').innerHTML=profilePhoto(c);toast('Photo saved.');};
  r.readAsDataURL(file);
}
function removePhoto(cid) {
  if(!confirm('Remove this photo?'))return;
  var c=S.contacts.find(x=>x.id===cid);if(!c)return;
  delete c.photo;persist();document.getElementById('ptab').innerHTML=profilePhoto(c);toast('Photo removed.');
}

function copyTemplate(tid, cid) {
  var t=S.templates.find(x=>x.id===tid), c=S.contacts.find(x=>x.id===cid);
  if(!t||!c)return;
  var body=t.body.replace(/{name}/g,c.firstName).replace(/{facility}/g,c.facility||'your facility');
  if(navigator.clipboard){navigator.clipboard.writeText(body).then(()=>toast('Copied — paste into your letter.'));}
  else{var el=document.createElement('textarea');el.value=body;document.body.appendChild(el);el.select();document.execCommand('copy');document.body.removeChild(el);toast('Copied.');}
}

  modal('<h3><i class="ti ti-file-text"></i> New letter template</h3>'

// ── INMATE RECORD PARSER ──────────────────────────────
function parseInmateRecord(raw) {
  var out={firstName:'',lastName:'',age:'',race:'',sex:'',arrestDate:'',releaseDate:'',courtDate:'',charges:'',bond:'',dockets:[],sentenceLength:'',paroleBoardDate:''};
  if(!raw)return out;
  var lines=raw.split('\n').map(l=>l.trim()).filter(l=>l);
  var nameMatch=raw.match(/Name:\s*\n?\s*([A-Z'\-]+),\s*([A-Z'\- ]+)/i);
  if(!nameMatch){for(var i=0;i<lines.length;i++){if(/^[A-Z'\-]+,\s*[A-Z'\- ]+$/.test(lines[i])){nameMatch=['',lines[i].split(',')[0].trim(),lines[i].split(',').slice(1).join(' ').trim()];break;}}}
  if(nameMatch){out.lastName=cap(nameMatch[1].trim());var rest=nameMatch[2].trim().split(/\s+/);out.firstName=cap(rest[0]);}
  var ageM=raw.match(/Age:\s*\n?\s*(\d+)/i);if(ageM)out.age=ageM[1];
  var rsM=raw.match(/Race\s*\/\s*Sex:\s*\n?\s*([A-Z ]+)\s*\/\s*([A-Z]+)/i);if(rsM){out.race=cap(rsM[1].trim());out.sex=cap(rsM[2].trim());}
  var aM=raw.match(/Arrest\s*Date:\s*\n?\s*([\d]{1,2}\/[\d]{1,2}\/[\d]{4})/i);if(aM)out.arrestDate=toISO(aM[1]);
  // Also try "Sentencing Date" for prison records
  if(!out.arrestDate){var sM=raw.match(/Sentenc(?:ing|ed)\s*Date:\s*\n?\s*([\d]{1,2}\/[\d]{1,2}\/[\d]{4})/i);if(sM)out.arrestDate=toISO(sM[1]);}
  var rM=raw.match(/Release\s*Date:\s*\n?\s*([\d]{1,2}\/[\d]{1,2}\/[\d]{4})/i);if(rM)out.releaseDate=toISO(rM[1]);
  // PRD / Projected Release Date
  if(!out.releaseDate){var prdM=raw.match(/(?:PRD|Projected\s*Release)\s*(?:Date)?:\s*\n?\s*([\d]{1,2}\/[\d]{1,2}\/[\d]{4})/i);if(prdM)out.releaseDate=toISO(prdM[1]);}
  var cM=raw.match(/Next\s*Court\s*Date:\s*\n?\s*([\d]{1,2}\/[\d]{1,2}\/[\d]{4})/i);if(cM)out.courtDate=toISO(cM[1]);
  // Sentence length e.g. "Sentence: 21 Months" or "21 months"
  var slM=raw.match(/Sentence(?:\s*Length)?:\s*([^\n]+)/i);if(slM)out.sentenceLength=slM[1].trim();
  // Parole board date
  var pbM=raw.match(/Parole\s*(?:Board|Eligibility|Review)\s*Date:\s*\n?\s*([\d]{1,2}\/[\d]{1,2}\/[\d]{4})/i);if(pbM)out.paroleBoardDate=toISO(pbM[1]);
  // Charges
  var chargeLines=[],dockets=[],totalBond='';
  var totalM=raw.match(/Total\s*Bond\s*Amount:\s*\$?([\d,]+\.?\d*)/i);if(totalM)totalBond='$'+totalM[1];
  var rowRx=/^(.+?)\s+(PRE-TRIAL|SENTENCED|CONVICTED|PENDING|RELEASED|ACQUITTED|DEFERRED|DISMISSED)\s+([\w\-\/]+)\s+(.+)$/gim;
  var m;
  while((m=rowRx.exec(raw))!==null){var charge=m[1].trim(),status=m[2].trim(),docket=m[3].trim();if(status!=='DISMISSED'){chargeLines.push(charge+' ['+status+']');if(!dockets.includes(docket))dockets.push(docket);}}
  if(!chargeLines.length){lines.forEach(function(l){var parts=l.split('\t');if(parts.length>=3){var charge=parts[0].trim(),status=(parts[1]||'').trim(),docket=(parts[2]||'').trim();if(charge&&status&&/PRE-TRIAL|SENTENCED|CONVICTED|PENDING/i.test(status)){chargeLines.push(charge+' ['+status+']');if(docket&&!dockets.includes(docket))dockets.push(docket);}}});}
  out.charges=chargeLines.join('\n');out.dockets=dockets;out.bond=totalBond||'';
  return out;
}
function toISO(d){if(!d)return '';var p=d.split('/');if(p.length!==3)return '';return p[2]+'-'+p[0].padStart(2,'0')+'-'+p[1].padStart(2,'0');}
function cap(s){if(!s)return '';return s.toLowerCase().replace(/\b\w/g,c=>c.toUpperCase());}

function runParser() {
  var raw=document.getElementById('f-paste').value;
  var p=parseInmateRecord(raw);
  if(!p.firstName&&!p.lastName){alert('Could not find a name. Check the format.');return;}
  // Auto-detect prison if "Sentenced" appears prominently or sentence length found
  var likelyPrison=p.sentenceLength||/\bsentenc(?:ed|ing)\b/i.test(raw);
  // Switch type accordingly
  switchContactType(likelyPrison?'prison':'jail');
  document.getElementById('f-fn').value=p.firstName;
  document.getElementById('f-ln').value=p.lastName;
  document.getElementById('f-rsa').value=(p.race||'')+' / '+(p.sex||'')+(p.age?' / '+p.age:'');
  document.getElementById('f-book').value=p.arrestDate;
  document.getElementById('f-rel2').value=p.releaseDate;
  document.getElementById('f-charges').value=p.charges;
  document.getElementById('f-bond')?document.getElementById('f-bond').value=p.bond:null;
  document.getElementById('f-court')?document.getElementById('f-court').value=p.courtDate:null;
  if(document.getElementById('f-parole'))document.getElementById('f-parole').value=p.paroleBoardDate;
  if(document.getElementById('f-sentlen'))document.getElementById('f-sentlen').value=p.sentenceLength;
  if(p.dockets.length&&document.getElementById('f-id'))document.getElementById('f-id').value=p.dockets.join(' / ');
  showIntakeTab('form');
  document.getElementById('parse-status').textContent='✓ Record parsed as '+(likelyPrison?'Prison':'Jail')+' — review fields and save.';
  document.getElementById('parse-status').style.color='#2d6a4f';
}

}

function saveMail() {

function deleteMail(mid,cid) {
  var c=S.contacts.find(x=>x.id===cid);if(!c)return;

// ── EXCEL EXPORT / IMPORT ─────────────────────────────
function exportToExcel() {
  if(typeof XLSX==='undefined'){alert('Excel library not loaded.');return;}
  var wb=XLSX.utils.book_new();
  var ph=['id','type','firstName','lastName','age','race','sex','facility','facilityAddr','inmateId','bookingDate','sentenceLength','releaseDate','courtDate','paroleBoardDate','charges','bond','mailInterval','relationship','notes','color','colorBg'];
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([ph,...S.contacts.map(c=>ph.map(k=>c[k]||''))]),'Profiles');
  var lh=['id','contactId','contactName','type','date','status','note','followup'];
  var lr=[];
  S.contacts.forEach(c=>(c.mailLog||[]).forEach(m=>lr.push([m.id,c.id,c.firstName+' '+c.lastName,m.type,m.date,m.status||'',m.note||'',m.followup||''])));
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([lh,...lr]),'Mail Logs');
  var th=['id','name','cat','body'];
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([th,...S.templates.map(t=>th.map(k=>t[k]||''))]),'Templates');
  var sr=[['MailBridge Backup',new Date().toLocaleString()],[''],['Total contacts',S.contacts.length],['Jail',S.contacts.filter(c=>!isPrison(c)).length],['Prison',S.contacts.filter(isPrison).length],['Mail sent',lr.filter(r=>!r[3].startsWith('Received')).length],['Mail received',lr.filter(r=>r[3].startsWith('Received')).length],[''],['Name','Type','Facility','Relationship','Sent','Received','Health'],...S.contacts.map(c=>[c.firstName+' '+c.lastName,(c.type||'jail'),c.facility,c.relationship,(c.mailLog||[]).filter(m=>!m.type.startsWith('Received')).length,(c.mailLog||[]).filter(m=>m.type.startsWith('Received')).length,healthScore(c)+'%'])];
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(sr),'Summary');
  XLSX.writeFile(wb,'MailBridge_Backup_'+todayStr()+'.xlsx');
  toast('Excel backup downloaded.');
}
function importFromExcel(input) {
  var file=input.files[0];if(!file)return;
  if(typeof XLSX==='undefined'){alert('Excel library not loaded.');return;}
  if(!confirm('Replace all current data? Export a backup first if needed.')){input.value='';return;}
  var r=new FileReader();
  r.onload=function(e){
    try{
      var wb=XLSX.read(e.target.result,{type:'array'});
      var ps=wb.Sheets['Profiles'],ls=wb.Sheets['Mail Logs'],ts=wb.Sheets['Templates'];
      if(!ps){alert('Invalid MailBridge backup.');return;}
      var pd=XLSX.utils.sheet_to_json(ps,{defval:''}),ld=ls?XLSX.utils.sheet_to_json(ls,{defval:''}):[], td=ts?XLSX.utils.sheet_to_json(ts,{defval:''}):[];
      S.contacts=pd.map(r=>({id:r.id||uid(),type:r.type||'jail',firstName:r.firstName||'',lastName:r.lastName||'',age:r.age||'',race:r.race||'',sex:r.sex||'',facility:r.facility||'',facilityAddr:r.facilityAddr||'',inmateId:r.inmateId||'',bookingDate:r.bookingDate||'',sentenceLength:r.sentenceLength||'',releaseDate:r.releaseDate||'',courtDate:r.courtDate||'',paroleBoardDate:r.paroleBoardDate||'',charges:r.charges||'',bond:r.bond||'',mailInterval:parseInt(r.mailInterval)||14,relationship:r.relationship||'Friend',notes:r.notes||'',color:r.color||COLORS[0].hex,colorBg:r.colorBg||COLORS[0].bg,photo:null,mailLog:[]}));
      ld.forEach(r=>{var c=S.contacts.find(x=>x.id===r.contactId);if(c)c.mailLog.push({id:r.id||uid(),type:r.type||'Letter',date:r.date||'',status:r.status||'Sent',note:r.note||'',followup:r.followup||''});});
      S.templates=td.map(r=>({id:r.id||uid(),name:r.name||'',cat:r.cat||'Other',body:r.body||''}));
      persist();input.value='';setView('dashboard');toast('Import complete — '+S.contacts.length+' contacts loaded.');
    }catch(err){alert('Could not read file: '+err.message);}
  };
  r.readAsArrayBuffer(file);
}
function exportJSON(){var b=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='MailBridge_Backup_'+todayStr()+'.json';a.click();toast('JSON backup downloaded.');}
function importJSON(input){var file=input.files[0];if(!file)return;if(!confirm('Replace all data?')){input.value='';return;}var r=new FileReader();r.onload=function(e){try{var p=JSON.parse(e.target.result);if(!p.contacts){alert('Invalid file.');return;}S=p;persist();input.value='';setView('dashboard');toast('JSON import complete.');}catch(err){alert('Could not parse: '+err.message);}};r.readAsText(file);}
